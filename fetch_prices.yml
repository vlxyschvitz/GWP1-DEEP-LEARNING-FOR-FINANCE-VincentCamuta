name: Fetch ETF Prices

on:
  schedule:
    - cron: "10 * * * *"   # every hour at :10 past
  workflow_dispatch:         # manual trigger from Actions tab

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-yfinance

      - name: Install deps
        run: pip install yfinance pandas

      - name: Fetch prices
        run: python scripts/fetch_prices.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_prices.csv data/latest_prices_meta.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "data: update ETF prices [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
